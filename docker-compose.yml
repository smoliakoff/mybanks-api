version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: mybanks
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      args:
        BUILD_SHA: ${BUILD_SHA:-dev}
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://app:app@db:5432/mybanks?sslmode=disable
      PORT: 8080
      APP_ENV: development
    ports:
      - "8080:8080"